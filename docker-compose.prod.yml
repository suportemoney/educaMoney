services:
  db:
    ports: !reset []

  backend:
    volumes: !reset []
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60
    environment:
      DJANGO_DEBUG: "0"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes: !reset []
    environment:
      VITE_API_BASE_URL: /api

  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
    volumes: !reset []
    environment:
      VITE_API_BASE_URL: /api

  nginx:
    volumes:
      - ./nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
