services:
  db:
    image: postgres:16-alpine
    container_name: educamoney_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-educamoney}
      POSTGRES_USER: ${POSTGRES_USER:-educamoney}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-educamoney_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-educamoney} -d ${POSTGRES_DB:-educamoney}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - educamoney_net

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: educamoney_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      # Override opcional; se vazio, usa /etc/educamoney/VERSION do build
      APP_VERSION: ${APP_VERSION:-}
      ALUNO_PORTAL_URL: ${ALUNO_PORTAL_URL:-http://localhost/portal/}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: python manage.py runserver 0.0.0.0:8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - educamoney_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: educamoney_frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: /api
      VITE_ALUNO_PORTAL_URL: /portal/
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - educamoney_net

  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile.dev
    container_name: educamoney_frontend_admin
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: /api
    volumes:
      - ./frontend-admin:/app
      - frontend_admin_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - educamoney_net

  frontend-aluno:
    build:
      context: ./frontend-aluno
      dockerfile: Dockerfile.dev
    container_name: educamoney_frontend_aluno
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: /api
    volumes:
      - ./frontend-aluno:/app
      - frontend_aluno_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - educamoney_net

  nginx:
    image: nginx:alpine
    container_name: educamoney_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
      frontend-admin:
        condition: service_started
      frontend-aluno:
        condition: service_started
    networks:
      - educamoney_net

volumes:
  postgres_data:
  frontend_node_modules:
  frontend_admin_node_modules:
  frontend_aluno_node_modules:

networks:
  educamoney_net:
    driver: bridge
