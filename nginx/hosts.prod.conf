# ProduÃ§Ã£o â€” 3 hosts (DNS): site, admin e aluno
# Substitua container frontend-* (build estÃ¡tico) pelas imagens de prod quando aplicÃ¡vel.

upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:80;
}

upstream frontend_admin {
    server frontend-admin:80;
}

upstream frontend_aluno {
    server frontend-aluno:80;
}

# Landing â€” educamoney.com.br
server {
    listen 80;
    server_name educamoney.com.br www.educamoney.com.br;

    client_max_body_size 500M;

    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location /media/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    location /static/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

